<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin N Florest</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loginSection" class="login-box">
    <h2>Login Admin N Florest</h2>
    <input type="text" id="usernameInput" placeholder="alfatih">
    <input type="password" id="pinInput" placeholder="140708" maxlength="6">
    <button id="loginBtn">Masuk</button>
    <p id="loginError"></p>
  </div>

  <div id="adminPanel" class="hidden">
    <header>
      <h1>Dashboard Admin</h1>
      <button id="logoutBtn">Logout</button>
    </header>

    <main>
      <section class="admin-section">
        <h3>Tambah Produk Baru</h3>
        <input type="text" id="namaProduk" placeholder="Nama Produk">
        <input type="number" id="hargaProduk" placeholder="Harga">
        <input type="number" id="stokProduk" placeholder="Stok">
        <input type="text" id="descProduk" placeholder="Deskripsi">
        <label class="upload-label">Upload Gambar Produk:</label>
        <input type="file" id="gambarFile" accept="image/*">
        <img id="previewImg" class="preview-img hidden">
        <button id="tambahBtn">Tambah Produk</button>
      </section>

      <section class="admin-section">
        <h3>Daftar Produk</h3>
        <div id="adminProductList"></div>
      </section>

      <section class="admin-section">
        <h3>Laporan Penjualan</h3>
        <div class="laporan-stats">
          <div class="stat-box">
            <span>Total Penjualan</span>
            <strong id="totalOmzet">Rp 0</strong>
          </div>
          <div class="stat-box">
            <span>Total Transaksi</span>
            <strong id="totalTransaksi">0</strong>
          </div>
        </div>
        <button id="resetLaporanBtn" class="btn-hapus">Reset Laporan</button>
        <div id="listPenjualan"></div>
      </section>

      <section class="admin-section">
        <h3>Pengaturan Admin</h3>
        <input type="text" id="usernameBaru" placeholder="Username Baru">
        <input type="password" id="pinLama" placeholder="PIN Lama">
        <input type="password" id="pinBaru" placeholder="PIN Baru 6 digit">
        <button id="gantiAkunBtn">Update Akun Admin</button>
      </section>
    </main>
  </div>

  <!-- Modal Edit Produk -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeEdit">&times;</span>
      <h2>Edit Produk</h2>
      <input type="hidden" id="editId">
      <input type="text" id="editNama" placeholder="Nama Produk">
      <input type="number" id="editHarga" placeholder="Harga">
      <input type="number" id="editStok" placeholder="Stok">
      <input type="text" id="editDesc" placeholder="Deskripsi">
      <label class="upload-label">Ganti Gambar:</label>
      <input type="file" id="editGambarFile" accept="image/*">
      <img id="editPreviewImg" class="preview-img">
      <button id="simpanEditBtn">Simpan Perubahan</button>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
